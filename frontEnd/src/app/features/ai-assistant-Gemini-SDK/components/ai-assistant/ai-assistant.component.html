<div class="chat-container" style="max-width: 500px; margin: 20px auto; border: 1px solid #ccc; padding: 10px; border-radius: 8px;">
    
    <div #scrollContainer class="chat-history" style="height: 800px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;">
        
          <div *ngFor="let msg of messages" 
            [ngStyle]="{
                'align-self': msg.role === 'user' ? 'flex-end' : 'flex-start',
                'background-color': msg.role === 'user' ? '#e3f2fd' : '#f5f5f5',
                'color': '#333333',
                'padding': '8px 12px', 
                'border-radius': '8px', 
                'max-width': '80%'
            }">

            <strong>{{ msg.role === 'user' ? 'You' : 'AI' }}:</strong>
            <p style="margin: 5px 0; white-space: pre-wrap;">{{ msg.content }}</p>
            
        </div>
        
    </div>

    <div style="display: flex; gap: 10px;">
        <label for="chatInput" style="display: none;">Ask AI</label>
        <input id="chatInput" #chatInput type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" 
            placeholder="Ask AI..." 
            [disabled]="isLoading"
            style="color: #333333; flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" />
            
        <button (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()"
                style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Send
        </button>
    </div>
</div>
